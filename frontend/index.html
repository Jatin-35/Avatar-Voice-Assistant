<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Permissions-Policy" content="microphone=(self)">
    <meta name="theme-color" content="#eef3ec">
    <title>Laxmi · TVS Motors</title>
    <link rel="icon" href="assets/image/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/avatar.css?v=13">
</head>

<body>

    <!-- ── Showroom environment (pure CSS — no art assets needed) ──────────────── -->
    <div class="showroom" aria-hidden="true">
        <div class="sr-wall"></div>
        <div class="sr-glow sr-glow-1"></div>
        <div class="sr-glow sr-glow-2"></div>
        <div class="sr-glow sr-glow-3"></div>
        <div class="sr-floor">
            <div class="sr-floor-grid"></div>
        </div>
        <div class="sr-vignette"></div>
    </div>

    <div class="app">

        <!-- ── Top bar ─────────────────────────────────────────────────────────── -->
        <header class="topbar">
            <div class="brand">
                <img src="assets/image/logo.png" alt="" class="brand-logo" onerror="this.style.display='none'">
                <div class="brand-text">
                    <span class="brand-name">Laxmi</span>
                    <span class="brand-sub">TVS Motors</span>
                </div>
            </div>
            <div class="state-pill" id="statePill" data-state="idle">
                <span class="state-dot"></span>
                <span id="stateLabel">Ready</span>
            </div>
        </header>

        <!-- ── Main content ────────────────────────────────────────────────────── -->
        <main class="content">

            <!-- Laxmi — centre stage -->
            <aside class="avatar-wrap">
                <div class="avatar-ring" id="avatarGlow"></div>
                <!-- Still pose — visible when bot is idle -->
                <img class="avatar-img" id="avatarStill" src="assets/image/humanoid/still_banner.gif?v=4" alt="Laxmi">
                <!-- Talking GIF — always animating in DOM (opacity:0), shown when bot speaks.
                     Never restarted mid-response, so the GIF loop seam is never visible. -->
                <img class="avatar-img avatar-talking" id="avatarTalking" src="assets/image/humanoid/animated_anchor.gif?v=4" alt="">
                <div class="avatar-podium"></div>
            </aside>

            <!-- Subtitle overlay — compact captions, hidden when empty -->
            <div class="subtitle">
                <p class="answer-idle" id="screenIdle"></p>
                <p class="answer-text" id="screenText"></p>
                <div class="caption" id="userTranscript">
                    <span class="cap-tag">You</span>
                    <span class="cap-text" id="transcriptText"></span>
                </div>
            </div>

        </main>

        <!-- ── Bottom dock ─────────────────────────────────────────────────────── -->
        <footer class="dock">
            <canvas class="viz" id="viz" width="720" height="72" aria-hidden="true"></canvas>
            <button class="mic-btn" id="micBtn" disabled aria-label="Microphone">
                <span class="mic-ripple"></span>
                <i class="mic-icon bi bi-mic-fill"></i>
            </button>
            <span class="mic-hint" id="micHint">Press Start</span>
        </footer>

        <!-- Mic mute toggle — when active, no audio input is captured -->
        <button class="mute-btn" id="muteBtn" aria-label="Mute microphone" title="Mute microphone">
            <i class="bi bi-mic-fill"></i>
        </button>

    </div>

    <!-- ── Intro / Enter overlay ───────────────────────────────────────────────── -->
    <div class="intro" id="intro">
        <div class="intro-inner">
            <img src="assets/image/logo.png" alt="" class="intro-logo" onerror="this.style.display='none'">
            <h1 class="intro-title">Laxmi</h1>
            <p class="intro-sub">TVS Motors · Virtual Showroom</p>
            <p class="intro-desc">Step into the showroom and ask Laxmi anything about the TVS King EV Max — in Hindi, English, or Hinglish.</p>
            <button class="intro-btn" id="enterBtn">
                <span>Enter Showroom</span><i class="bi bi-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Hidden audio element — drives the MP3 queue -->
    <audio id="audioPlayer" style="display:none;" playsinline></audio>

    <script type="module" src="assets/js/app.js?v=5"></script>
    <script type="module" src="assets/js/showroom.js?v=4"></script>
</body>

</html>
