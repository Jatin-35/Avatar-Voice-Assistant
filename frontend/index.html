<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Permissions-Policy" content="microphone=(self)">
    <meta name="theme-color" content="#ffffff">
    <title>Sakshi · Sonalika Tractors</title>
    <link rel="icon" href="assets/image/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/avatar.css">
</head>

<body>

    <div class="app">

        <!-- ── Top bar ─────────────────────────────────────────────────────────── -->
        <header class="topbar">
            <div class="brand">
                <img src="assets/image/logo.jpg" alt="" class="brand-logo" onerror="this.style.display='none'">
                <div class="brand-text">
                    <span class="brand-name">Sakshi</span>
                    <span class="brand-sub">Sonalika Tractors</span>
                </div>
            </div>
            <div class="state-pill" id="statePill" data-state="idle">
                <span class="state-dot"></span>
                <span id="stateLabel">Ready</span>
            </div>
        </header>

        <!-- ── Main content ────────────────────────────────────────────────────── -->
        <main class="content">

            <!-- LEFT — answer + caption -->
            <section class="panel">
                <div class="answer-card">
                    <div class="answer-scroll">
                        <p class="answer-idle" id="screenIdle">Press <b>Start</b>, then ask me anything about Sonalika
                            tractors.</p>
                        <p class="answer-text" id="screenText"></p>
                    </div>
                </div>

                <div class="caption" id="userTranscript">
                    <span class="cap-tag">You</span>
                    <span class="cap-text" id="transcriptText"></span>
                </div>
            </section>

            <!-- RIGHT — avatar -->
            <aside class="avatar-wrap">
                <div class="avatar-ring" id="avatarGlow"></div>
                <!-- Still pose — visible when bot is idle -->
                <img class="avatar-img" id="avatarStill" src="assets/image/humanoid/still_banner.gif" alt="Sakshi">
                <!-- Talking GIF — always animating in DOM (opacity:0), shown when bot speaks.
                     Never restarted mid-response, so the GIF loop seam is never visible. -->
                <img class="avatar-img avatar-talking" id="avatarTalking" src="assets/image/humanoid/animated_anchor.gif" alt="">
            </aside>

        </main>

        <!-- ── Bottom dock ─────────────────────────────────────────────────────── -->
        <footer class="dock">
            <canvas class="viz" id="viz" width="720" height="72" aria-hidden="true"></canvas>
            <button class="mic-btn" id="micBtn" disabled aria-label="Microphone">
                <span class="mic-ripple"></span>
                <i class="mic-icon bi bi-mic-fill"></i>
            </button>
            <span class="mic-hint" id="micHint">Press Start</span>
        </footer>

    </div>

    <!-- Hidden audio element — drives the MP3 queue -->
    <audio id="audioPlayer" style="display:none;" playsinline></audio>

    <script type="module" src="assets/js/app.js"></script>
</body>

</html>
